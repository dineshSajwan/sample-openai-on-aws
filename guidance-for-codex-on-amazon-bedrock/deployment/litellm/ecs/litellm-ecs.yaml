AWSTemplateFormatVersion: "2010-09-09"
Description: LiteLLM gateway on ECS Fargate - reuses existing networking and OTel collector stacks

Parameters:
  NetworkingStackName:
    Type: String
    Default: codex-test-networking
    Description: Name of the networking CloudFormation stack (exports VpcId and SubnetIds)

  OtelStackName:
    Type: String
    Default: codex-test-otel-collector
    Description: Name of the OTel collector stack (exports CollectorEndpoint). Ignored if EnableOtel=false.

  EnableOtel:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      When false (default), the gateway runs without OTel env vars and does NOT import
      ${OtelStackName}-endpoint, so the OTel collector stack does not need to exist.
      Set to true only if you've separately deployed an OTel collector and want the
      gateway to forward traces to it.

  LiteLLMMasterKey:
    Type: String
    NoEcho: true
    Description: LiteLLM master key - stored in Secrets Manager

  DBPassword:
    Type: String
    NoEcho: true
    Description: Password for the RDS PostgreSQL instance

  AwsRegion:
    Type: String
    Default: us-east-1

  LiteLLMImage:
    Type: String
    AllowedPattern: ".+/.+:.+"
    ConstraintDescription: >
      Must be a fully-qualified image reference such as
      <account>.dkr.ecr.<region>.amazonaws.com/codex-litellm:<tag>.
    Description: >
      Required. Fully-qualified container image reference for the LiteLLM
      gateway. Build a custom image using deployment/litellm/Dockerfile
      (FROM ghcr.io/berriai/litellm:main-latest plus COPY litellm_config.yaml
      /app/config.yaml), push it to ECR, and pass the image URI here. The
      upstream ghcr.io/berriai/litellm image has no /app/config.yaml and will
      crash-loop on startup.

  AllowedCidr:
    Type: String
    Default: 10.0.0.0/8
    Description: >
      CIDR allowed to reach the ALB. Defaults to RFC1918 private network (10.0.0.0/8).
      For enterprise deployments, use your corporate network CIDR or VPN range.
      Do NOT use 0.0.0.0/0 - AWS security scans will auto-delete the listener.
      For public access, deploy AWS WAF with rate limiting and IP reputation filtering.

  # JWT Middleware Parameters (optional - for OIDC authentication)
  EnableJwtMiddleware:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      Enable JWT middleware for OIDC/SSO authentication.
      If false, uses standard API key authentication.

  JwtMiddlewareImage:
    Type: String
    Default: ""
    Description: >
      JWT middleware container image URI (required if EnableJwtMiddleware=true).
      Format: <account>.dkr.ecr.<region>.amazonaws.com/codex-jwt-middleware:latest

  JwksUrl:
    Type: String
    Default: ""
    Description: >
      JWKS URL from IdP (required if EnableJwtMiddleware=true).
      Example: https://your-tenant.okta.com/.well-known/jwks.json

  JwtAudience:
    Type: String
    Default: ""
    Description: >
      Expected JWT audience claim (optional).
      Leave empty to skip audience validation.

  JwtIssuer:
    Type: String
    Default: ""
    Description: >
      Expected JWT issuer claim (optional).
      Leave empty to skip issuer validation.

  UserKeyMappingStackName:
    Type: String
    Default: ""
    Description: >
      CloudFormation stack name for user-key-mapping DynamoDB table (required if EnableJwtMiddleware=true).
      Example: codex-user-key-mapping

Conditions:
  UseJwtMiddleware: !Equals [!Ref EnableJwtMiddleware, "true"]
  OtelEnabled: !Equals [!Ref EnableOtel, "true"]

Resources:

  # --- Secrets ---

  LiteLLMSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/litellm-master-key"
      SecretString: !Sub '{"LITELLM_MASTER_KEY":"${LiteLLMMasterKey}"}'

  # --- IAM ---

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref LiteLLMSecret

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/*"
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
        # DynamoDB access for JWT middleware (conditional)
        - !If
          - UseJwtMiddleware
          - PolicyName: DynamoDBAccess
            PolicyDocument:
              Statement:
                - Effect: Allow
                  Action:
                    - dynamodb:GetItem
                    - dynamodb:PutItem
                    - dynamodb:Query
                    - dynamodb:Scan
                  Resource: !Sub
                    - "arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}"
                    - TableName: !ImportValue
                        Fn::Sub: "${UserKeyMappingStackName}-TableName"
          - !Ref AWS::NoValue

  # --- Security Groups ---

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LiteLLM ALB - restricted inbound
      VpcId: !ImportValue
        Fn::Sub: "${NetworkingStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedCidr

  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LiteLLM ECS task
      VpcId: !ImportValue
        Fn::Sub: "${NetworkingStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !If [UseJwtMiddleware, 8080, 4000]
          ToPort: !If [UseJwtMiddleware, 8080, 4000]
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: LiteLLM RDS - inbound from ECS task
      VpcId: !ImportValue
        Fn::Sub: "${NetworkingStackName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref TaskSecurityGroup

  # --- RDS ---

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: LiteLLM RDS subnets
      SubnetIds: !Split
        - ","
        - !ImportValue
          Fn::Sub: "${NetworkingStackName}-SubnetIds"

  RDSInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: litellm
      DBInstanceClass: db.t4g.micro
      Engine: postgres
      EngineVersion: "16"
      MasterUsername: litellm
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: "20"
      StorageEncrypted: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      DeletionProtection: true
      BackupRetentionPeriod: 7

  # --- ECS ---

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-cluster"
      CapacityProviders: [FARGATE]

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${AWS::StackName}"
      RetentionInDays: 30

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${AWS::StackName}-task"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "1024"
      Memory: "2048"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        # LiteLLM Gateway Container
        - Name: litellm
          Image: !Ref LiteLLMImage
          PortMappings:
            - ContainerPort: 4000
          Command: ["--config", "/app/config.yaml", "--port", "4000"]
          Environment:
            - Name: AWS_REGION
              Value: !Ref AwsRegion
            - !If
              - OtelEnabled
              - Name: OTEL_EXPORTER
                Value: otlp_http
              - !Ref AWS::NoValue
            - !If
              - OtelEnabled
              - Name: OTEL_ENDPOINT
                Value: !ImportValue
                  Fn::Sub: "${OtelStackName}-endpoint"
              - !Ref AWS::NoValue
            - Name: DATABASE_URL
              Value: !Sub "postgresql://litellm:${DBPassword}@${RDSInstance.Endpoint.Address}:5432/litellm"
          Secrets:
            - Name: LITELLM_MASTER_KEY
              ValueFrom: !Sub "${LiteLLMSecret}:LITELLM_MASTER_KEY::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: litellm

        # JWT Middleware Container (conditional - only if EnableJwtMiddleware=true)
        - !If
          - UseJwtMiddleware
          - Name: jwt-middleware
            Image: !Ref JwtMiddlewareImage
            PortMappings:
              - ContainerPort: 8080
            Environment:
              - Name: JWKS_URL
                Value: !Ref JwksUrl
              - Name: JWT_AUDIENCE
                Value: !Ref JwtAudience
              - Name: JWT_ISSUER
                Value: !Ref JwtIssuer
              - Name: LITELLM_URL
                Value: "http://localhost:4000"
              - Name: AWS_REGION
                Value: !Ref AWS::Region
              - Name: DYNAMODB_TABLE
                Value: !ImportValue
                  Fn::Sub: "${UserKeyMappingStackName}-TableName"
            Secrets:
              - Name: LITELLM_MASTER_KEY
                ValueFrom: !Sub "${LiteLLMSecret}:LITELLM_MASTER_KEY::"
            DependsOn:
              - ContainerName: litellm
                Condition: START
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-group: !Ref LogGroup
                awslogs-region: !Ref AWS::Region
                awslogs-stream-prefix: jwt-middleware
          - !Ref AWS::NoValue

  # --- ALB ---

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Type: application
      Subnets: !Split
        - ","
        - !ImportValue
          Fn::Sub: "${NetworkingStackName}-SubnetIds"
      SecurityGroups:
        - !Ref ALBSecurityGroup

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !ImportValue
        Fn::Sub: "${NetworkingStackName}-VpcId"
      Protocol: HTTP
      # If JWT middleware enabled, target port 8080, otherwise target LiteLLM directly on port 4000
      Port: !If [UseJwtMiddleware, 8080, 4000]
      TargetType: ip
      # If JWT middleware enabled, use /health, otherwise use LiteLLM's /health/liveliness
      HealthCheckPath: !If [UseJwtMiddleware, /health, /health/liveliness]

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # --- ECS Service ---

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: 2
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Split
            - ","
            - !ImportValue
              Fn::Sub: "${NetworkingStackName}-SubnetIds"
          SecurityGroups:
            - !Ref TaskSecurityGroup
          AssignPublicIp: ENABLED
      LoadBalancers:
        - ContainerName: !If [UseJwtMiddleware, jwt-middleware, litellm]
          ContainerPort: !If [UseJwtMiddleware, 8080, 4000]
          TargetGroupArn: !Ref ALBTargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200

Outputs:
  GatewayEndpoint:
    Description: LiteLLM gateway URL - set as OPENAI_BASE_URL in Codex config
    Value: !Sub "http://${ALB.DNSName}/v1"
    Export:
      Name: !Sub "${AWS::StackName}-GatewayEndpoint"

  OtelEndpoint:
    Condition: OtelEnabled
    Description: OTel collector endpoint used by this deployment
    Value: !ImportValue
      Fn::Sub: "${OtelStackName}-endpoint"
