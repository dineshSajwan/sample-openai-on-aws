AWSTemplateFormatVersion: '2010-09-09'
Description: 'Codex on Bedrock — CloudWatch dashboard (per-user usage, error rate, spend estimate). Reads metrics emitted by the Codex CLI via the OTel collector stack.'

Parameters:
  DashboardName:
    Type: String
    Default: CodexOnBedrock
    Description: Name of the CloudWatch dashboard

  MetricsNamespace:
    Type: String
    Default: Codex
    Description: CloudWatch namespace metrics are published under (must match otel-collector.yaml MetricsNamespace)

  # Pricing multipliers are USD per 1M tokens. Update to the current Bedrock
  # list price for the model you run with Codex. Defaults below are placeholders
  # — they estimate order-of-magnitude spend, not actual billed cost. Ground
  # truth is CUR (see specs/02-otel-dashboard.md).
  InputTokenPriceUsdPerMillion:
    Type: Number
    Default: 0.15
    Description: USD per 1M input tokens (placeholder — set to real Bedrock list price)

  OutputTokenPriceUsdPerMillion:
    Type: Number
    Default: 0.60
    Description: USD per 1M output tokens

  CachedInputTokenPriceUsdPerMillion:
    Type: Number
    Default: 0.075
    Description: USD per 1M cached-input tokens

Resources:
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [
            {"type":"text","x":0,"y":0,"width":24,"height":2,"properties":{"markdown":"# Codex on Bedrock — Usage & Adoption\n\nPer-user attribution via install-time-baked `x-user-id` header. Metrics emitted by Codex CLI, aggregated through ADOT collector to CloudWatch. **Spend figures are estimates** from token counts × Bedrock list pricing; ground-truth spend lives in CUR (see `specs/02-otel-dashboard.md`)."}},

            {"type":"metric","x":0,"y":2,"width":12,"height":6,"properties":{
              "title":"Estimated token spend (USD) per user — last 24h",
              "region":"${AWS::Region}","view":"bar","stacked":true,"period":86400,
              "metrics":[
                [{"expression":"SEARCH('Namespace=\"${MetricsNamespace}\" MetricName=\"codex.turn.token_usage\" token_type=\"input\"', 'Sum', 86400)","label":"input","id":"i","visible":false}],
                [{"expression":"SEARCH('Namespace=\"${MetricsNamespace}\" MetricName=\"codex.turn.token_usage\" token_type=\"output\"', 'Sum', 86400)","label":"output","id":"o","visible":false}],
                [{"expression":"SEARCH('Namespace=\"${MetricsNamespace}\" MetricName=\"codex.turn.token_usage\" token_type=\"cached_input\"', 'Sum', 86400)","label":"cached_input","id":"c","visible":false}],
                [{"expression":"i * ${InputTokenPriceUsdPerMillion} / 1000000","label":"$ input (est)","id":"e1"}],
                [{"expression":"o * ${OutputTokenPriceUsdPerMillion} / 1000000","label":"$ output (est)","id":"e2"}],
                [{"expression":"c * ${CachedInputTokenPriceUsdPerMillion} / 1000000","label":"$ cached (est)","id":"e3"}]
              ]
            }},

            {"type":"metric","x":12,"y":2,"width":12,"height":6,"properties":{
              "title":"API error rate per user (last 1h)","region":"${AWS::Region}","view":"bar","stacked":false,"period":3600,
              "metrics":[
                [{"expression":"SEARCH('Namespace=\"${MetricsNamespace}\" MetricName=\"codex.api_request\" success=\"false\"', 'Sum', 3600)","label":"failed requests","id":"f"}],
                [{"expression":"SEARCH('Namespace=\"${MetricsNamespace}\" MetricName=\"codex.api_request\" success=\"true\"', 'Sum', 3600)","label":"successful requests","id":"s"}]
              ]
            }},

            {"type":"metric","x":0,"y":8,"width":12,"height":6,"properties":{
              "title":"Turn E2E duration per user (p50 / p95)","region":"${AWS::Region}","view":"timeSeries","period":300,
              "metrics":[
                [{"expression":"SEARCH('Namespace=\"${MetricsNamespace}\" MetricName=\"codex.turn.e2e_duration_ms\"', 'p50', 300)","label":"p50","id":"p50"}],
                [{"expression":"SEARCH('Namespace=\"${MetricsNamespace}\" MetricName=\"codex.turn.e2e_duration_ms\"', 'p95', 300)","label":"p95","id":"p95"}]
              ]
            }},

            {"type":"metric","x":12,"y":8,"width":12,"height":6,"properties":{
              "title":"Session-source mix (cli / desktop / vscode)","region":"${AWS::Region}","view":"pie","period":86400,"stat":"Sum",
              "metrics":[
                [{"expression":"SEARCH('Namespace=\"${MetricsNamespace}\" MetricName=\"codex.thread.started\"', 'Sum', 86400)","label":"threads by source","id":"t"}]
              ]
            }},

            {"type":"log","x":0,"y":14,"width":12,"height":6,"properties":{
              "title":"Active-developer leaderboard (last 7 days)","region":"${AWS::Region}",
              "query":"SOURCE '/aws/codex/metrics' | filter ispresent(`user.id`) and ispresent(`codex.api_request`) | stats count() as api_requests, sum(`codex.api_request`) as total_calls by `user.id` | sort total_calls desc | limit 25"
            }},

            {"type":"log","x":12,"y":14,"width":12,"height":6,"properties":{
              "title":"Adoption funnel (last 7 days)","region":"${AWS::Region}",
              "query":"SOURCE '/aws/codex/metrics' | stats count_distinct(`user.id`) as installed by `app.version` | sort installed desc"
            }},

            {"type":"text","x":0,"y":20,"width":24,"height":2,"properties":{"markdown":"## Code acceptance — pending validation\n\nCodex 0.130.0-alpha.7 did not emit `codex.code_edit_tool.*` metrics during simple text prompts. These metrics may only fire during actual edit flows. If your developers run code-edit sessions and the metrics surface, add a panel here filtered on `codex.code_edit_tool.decision` with dimension `decision`."}}
          ]
        }

Outputs:
  DashboardURL:
    Description: Direct link to the dashboard in CloudWatch
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards/dashboard/${DashboardName}'
  DashboardName:
    Value: !Ref DashboardName
    Export:
      Name: !Sub '${AWS::StackName}-DashboardName'
